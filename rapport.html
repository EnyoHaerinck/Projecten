<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapport Berekening</title>
  <link rel="stylesheet" href="nav.css">
  <style>

   :root {
  /* Light theme (jouw huidige stijl) */
  --bg: #f4f4f9;
  --container-bg: #ffffff;
  --container-border: #bae6fd80;
  --text: #2c3e50;
  --th-bg: #dff6ffba;
  --th-text: #2c3e50;
  --td-bg: #fcfeff;
  --input-border: #b7d1f9;
  --button-bg: rgb(240 249 255 / 1);
  --button-text: rgb(2 132 199 / 1);
  --bg-chart: #4bc0c0;
}

/* Dark theme */
[data-theme="dark"] {
  --bg: #0f1720;
  --container-bg: linear-gradient(180deg, #0b0b0d, #0f1113);
  --container-border: #374151;
  --text: #ffffff;
  --th-bg: #1f2937;
  --th-text: #ffffff;
  --td-bg: #1b1c20;
  --input-border: #374151;
  --button-bg: #374151;
  --button-text: #ffffff;
  --bg-chart: #1d2f42;
}



  body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: var(--bg); /* gradient of plain white afhankelijk van theme */
  color: var(--text);
}

.container {
  border: 2px solid var(--container-border);
  background: var(--container-bg);
  border-radius: 10px; /* Rounded corners */
  padding: 20px; /* Padding inside the container */
  max-width: 800px; /* Maximum width for the container */
  margin: 10px auto;
  padding: 50px;
  --tw-shadow: 0 25px 50px -12px rgb(0 0 0 / .25);
  --tw-shadow-colored: 0 25px 50px -12px var(--tw-shadow-color);
  box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
  margin-bottom: 30px;
}

h1 {
  text-align: center;
  color: var(--text);
  font-weight: 1000;
  margin-bottom: 30px;
  font-size: 3rem;
  line-height: 1;
}

table {
  width: 100%;
  border-collapse: separate; /* Change to 'separate' for border-radius to work */
  border-spacing: 0; /* Optional: Removes spacing between cells */
  margin-top: 20px;
  border: 5px solid var(--container-border); /* Remove table border if needed */
  border-radius: 6px; /* Add border-radius */
  overflow: hidden; /* Ensures rounded corners are visible */
  background-color: #fff; /* Optional: Matches container background */
}

th, td {
  border: 2px solid #bae6fd80; /* Border around the container */
  padding: 8px;
  text-align: center;
  color: var(--th-text);
}

th {
  background-color: var(--th-bg);
  color: var(--th-text);
}

input {
  width: 90%;
  padding: 5px;
  box-sizing: border-box;
  border-radius: 10px;
  border: 2px solid var(--input-border);
  color: var(--text);
  background: var(--container-bg);
  
}

input:focus {
  border-radius: 10px;
  outline: 2px solid #b7d1f9;
}

td {
   background-color: var(--td-bg);
  color: var(--text);
}

#loginForm {
  text-align: center;
  width: 200px;
  position: fixed;
  left: 60px;
  top: 70px;
  border: 2px solid #bae6fd80; /* Border around the container */
  border-radius: 10px; /* Rounded corners */
  padding: 10px;
  background: var(--container-bg);
  --tw-shadow: 0 25px 50px -12px rgb(0 0 0 / .25);
  --tw-shadow-colored: 0 25px 50px -12px var(--tw-shadow-color);
  box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
}

#pasteModal {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border: 2px solid #bae6fd80;
    background: var(--container-bg);
    --tw-shadow: 0 25px 50px -12px rgb(0 0 0 / .25);
    --tw-shadow-colored: 0 25px 50px -12px var(--tw-shadow-color);
    padding:20px; border-radius:10px;
    width:400px;
    z-index:1000;
    box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
}

button, #loginUser, #registerUser {
  text-decoration: none;
  border: none;
  background-color: var(--button-bg);
  color: var(--button-text);
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  transition: background-color 0.3s ease, transform 0.2s ease;
  padding: 10px;
  margin: 2px;
}

button:hover {
  background-color: rgb(220 229 251 / var(--tw-text-opacity, 1)); ;
   transform: translateY(-2px);
}

#saveRapport {
  text-decoration: none;
  border: none;
  background-color: rgb(132, 238, 185) !important;
  color: black !important;
  font-weight: bold;
  border-radius: 9px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  transition: background-color 0.3s ease, transform 0.2s ease;
  padding: 10px;
  margin: 4px;
}

#username, #password {
  margin-bottom: 2px;
}

h2 {
  text-align: center;
  color: var(--text);
  font-weight: 1000;
  margin: 0;
  font-size: 25px;
  line-height: 0;
}
/* Mobiele CSS-stijlen */
@media screen and (max-width: 768px) {
  body {
    padding: 10px;
  }

  .container {
    padding: 15px;
    max-width: 100%;
    margin: 10px auto;
    background-color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 1.5rem;
  }

  table {
    font-size: 12px;
    border-width: 2px;
    width: 100%;
  }

  th, td {
    padding: 3px;
    font-size: 10px;
  }

  input {
    width: 75%;
    font-size: 12px;
    padding: 3px;
  }

  button, #loginUser, #registerUser, #saveRapport {
    padding: 6px;
    font-size: 12px;
  }

  #loginForm {
    width: 90%;
    padding: 15px;
    margin-bottom: 20px;
    --tw-shadow: 0 25px 50px -12px rgb(0 0 0 / .25);
    --tw-shadow-colored: 0 15px 10px -6px var(--tw-shadow-color);
    box-shadow: var(--tw-ring-offset-shadow, 0 0 #60606000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
    top: 10px;
    left: 50%;
    position: relative;
    transform: translateX(-50%);
  }

  #username, #password {
    display: flex;
    justify-content: center;
    text-align: center;
    align-items: center;
  }

  nav {
    font-size: 12px;
    padding: 8px;
    
  }

  .menu a {
    display: block;
    padding: 8px;
  }
}



</style>

</head>
<body>

  <nav>
    <div id="navigation">
      
        Menu
        <div class="menu">
            <a href="home.html">Home</a>
            <a href="remweg.html">Remweg</a>
            <a href="rapport.html">Rapport</a>
            <a href="aitools.html">AI Tools</a>
            <button id="themeToggle">🌓</button>
        </div>
    </div>
  </nav>

  <form id="loginForm">
    <input type="text" id="username" placeholder="Gebruikersnaam" required>
    <input type="password" id="password" placeholder="Wachtwoord" required>
    <button id="loginUser" type="submit">Login</button>
    <button id="registerUser" type="button">Registreer</button>
    <button id="saveRapport" type="button">Rapport opslaan</button>
    <button id="logoutButton" type="button" style="display: none;">Uitloggen</button>
    <button id="pastePointsBtn">📋Copy & Paste</button>
  </form>

  <div id="pasteModal">
        <textarea id="pasteInput" style="width:100%; margin: 0; height:150px; resize: none; border-radius: 9px; background: var(--container-bg); color: var(--text); border: 2px solid #bae6fd80"></textarea>
        <br><br>
        <button id="processPaste">Verwerken</button>
        <button id="closePaste">Sluiten</button>
    </div>
  

  <!-- Lijst met opgeslagen rapporten -->
  <div class="container">
    <h2>Opgeslagen Rapporten</h2>
    <ul id="rapportList"></ul>
  </div>

  <!-- Rapport Berekening Tabel en Grafiek -->
  <div class="container">
    <h1>Rapport Berekening</h1>
    <table>
      <thead>
        <tr>
          <th>Vak</th>
          <th>Totaal Verdiend</th>
          <th>Totaal Te Verdienen</th>
          <th>Procent</th>
          <th>Verdiend / Max Punten</th>
        </tr>
      </thead>
      <tbody id="rapportTable">
        <!-- De rijen worden hier dynamisch gegenereerd -->
      </tbody>
    </table>
    <div class="chart-container">
      <canvas id="procentChart"></canvas>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const vakken = [
      { naam: "AV Aardrijkskunde", maxPunten: 10 },
      { naam: "AV Chemie", maxPunten: 20 },
      { naam: "AV Engineering", maxPunten: 50 },
      { naam: "AV Fysica (elektriciteit/elektronica)", maxPunten: 20 },
      { naam: "AV Fysica (mechanica))", maxPunten: 20 },
      { naam: "AV Nederlands", maxPunten: 30 },
      { naam: "AV Wiskunde", maxPunten: 70 },
      { naam: "AV Creatieve ontwikkeling", maxPunten: 10 },
      { naam: "AV Engels", maxPunten: 20 },
      { naam: "AV Frans", maxPunten: 20 },
      { naam: "AV Geschiedenis", maxPunten: 10 },
      { naam: "AV Godsdienst", maxPunten: 20 },
      { naam: "AV Lichamelijke opvoeding", maxPunten: 20 },  
    ];

    const tableBody = document.getElementById("rapportTable");

    // Dynamisch vakken toevoegen
    vakken.forEach((vak, index) => {
      const row = document.createElement("tr");

      // Vaknaam
      const vakCell = document.createElement("td");
      vakCell.textContent = vak.naam;
      row.appendChild(vakCell);



     // Totaal verdiend
      const totaalVerdiendCell = document.createElement("td");
      const totaalVerdiendInput = document.createElement("input");
      totaalVerdiendInput.type = "number";
      totaalVerdiendInput.id = `totaalVerdiend-${index}`;
      totaalVerdiendInput.value = ""; // Zet standaardwaarde op 0
      totaalVerdiendCell.appendChild(totaalVerdiendInput);
      row.appendChild(totaalVerdiendCell);

      // Totaal te verdienen
      const totaalTeVerdienenCell = document.createElement("td");
      const totaalTeVerdienenInput = document.createElement("input");
      totaalTeVerdienenInput.type = "number";
      totaalTeVerdienenInput.id = `totaalTeVerdienen-${index}`;
      totaalTeVerdienenInput.value = ""; // Zet standaardwaarde op 0
      totaalTeVerdienenCell.appendChild(totaalTeVerdienenInput);
      row.appendChild(totaalTeVerdienenCell);


      // Procent
      const procentCell = document.createElement("td");
      procentCell.id = `procent-${index}`;
      row.appendChild(procentCell);

      // Verdiend / Max Punten
      const verdiendCell = document.createElement("td");
      verdiendCell.id = `verdiend-${index}`;
      row.appendChild(verdiendCell);

      tableBody.appendChild(row);

      // Berekeningen bij verandering
      totaalTeVerdienenInput.addEventListener("input", () => {
        updateRow(index);
        updateTotals();
      });
      totaalVerdiendInput.addEventListener("input", () => {
        updateRow(index);
        updateTotals();
      });
    });

  

    // Functie voor berekeningen per rij
    function updateRow(index) {
    const totaalTeVerdienenInput = document.getElementById(`totaalTeVerdienen-${index}`);
    const totaalVerdiendInput = document.getElementById(`totaalVerdiend-${index}`);
    const procentCell = document.getElementById(`procent-${index}`);
    const verdiendCell = document.getElementById(`verdiend-${index}`);

    const totaalTeVerdienen = parseFloat(totaalTeVerdienenInput.value);
    const totaalVerdiend = parseFloat(totaalVerdiendInput.value);
    const maxPunten = vakken[index].maxPunten;

    // Voorkom berekening als een van de velden leeg is
    if (isNaN(totaalTeVerdienen) || isNaN(totaalVerdiend) || totaalTeVerdienen === 0) {
        procentCell.textContent = "";
        verdiendCell.textContent = "";
        return; // Stop hier de functie
    }

    const procent = (totaalVerdiend / totaalTeVerdienen) * 100;
    procentCell.textContent = `${procent.toFixed(2)}%`;

    const verdiend = (totaalVerdiend / totaalTeVerdienen) * maxPunten;
    verdiendCell.textContent = `${verdiend.toFixed(2)} / ${maxPunten}`;

    updateTotals();
    updateChart();
}



    // Voeg een extra rij toe voor de totaalcijfers
    const totalRow = document.createElement("tr");
    totalRow.innerHTML = `
      <td><strong>Totaal</strong></td>
      <td></td>
      <td></td>
      <td id="totaalProcent"></td>
      <td id="totaalVerdiendMax"></td>
    `;
    tableBody.appendChild(totalRow);

    // Functie voor berekening van de totaalcijfers
    function updateTotals() {
    let totaalVerdiend = 0;
    let totaalMaxPunten = 0;

    vakken.forEach((vak, index) => {
        const verdiendCell = document.getElementById(`verdiend-${index}`).textContent;
        if (verdiendCell) {
            const [verdiend, maxPunten] = verdiendCell.split(" / ").map(Number);
            totaalVerdiend += verdiend || 0;
            totaalMaxPunten += maxPunten || 0;
        }
    });

    const totaalProcent = totaalMaxPunten ? (totaalVerdiend / totaalMaxPunten) * 100 : 0;
    document.getElementById("totaalProcent").textContent = `${totaalProcent.toFixed(2)}%`;
    document.getElementById("totaalVerdiendMax").textContent = `${totaalVerdiend.toFixed(2)} / ${totaalMaxPunten}`;
}

    // Data voor de grafiek
    let chartkleur = "#4bc0c0";
    const chartLabels = vakken.map(vak => vak.naam);
    let chartData = vakken.map(() => 0); // Initialiseer alle percentages op 0
    let procentChart;

    // Functie om de grafiek bij te werken
    function updateChart() {
    // Data updaten
    chartData = vakken.map((_, index) => {
      const procentCell = document.getElementById(`procent-${index}`).textContent;
      return parseFloat(procentCell.replace('%', '')) || 0;
    });

    // Dataset aanpassen
    procentChart.data.datasets[0].data = chartData;
    procentChart.data.datasets[0].backgroundColor = chartkleur;
    procentChart.data.datasets[0].borderColor = chartkleur;

    // Slechts 1 update call
    procentChart.update();
  }

    

    // Initialiseer de grafiek
    function createChart() {
      const ctx = document.getElementById("procentChart").getContext("2d");
      procentChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: chartLabels,
          datasets: [
            {
              label: "PROCENTEN PER VAK",
              data: chartData,
              backgroundColor: chartkleur,
              borderColor: chartkleur,
              borderWidth: 0.5,
            },
          ],
        },
        options: {
          scales: {
            x: {
              title: {
                display: true,
                text: "Vakken",
              },
            },
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Procent (%)",
              },
            },
          },
        },
      });
    }

    // Maak de grafiek bij het laden
    createChart();
  

    // Update de grafiek elke keer dat de tabelwaarden veranderen
    function updateRow(index) {
      const totaalTeVerdienen = parseFloat(document.getElementById(`totaalTeVerdienen-${index}`).value) || 0;
      const totaalVerdiend = parseFloat(document.getElementById(`totaalVerdiend-${index}`).value) || 0;
      const maxPunten = vakken[index].maxPunten;

      // Procent
      const procent = totaalTeVerdienen ? (totaalVerdiend / totaalTeVerdienen) * 100 : 0;
      document.getElementById(`procent-${index}`).textContent = `${procent.toFixed(2)}%`;

      // Verdiend / Max Punten
      const verdiend = totaalTeVerdienen ? (totaalVerdiend / totaalTeVerdienen) * maxPunten : 0;
      document.getElementById(`verdiend-${index}`).textContent = `${verdiend.toFixed(2)} / ${maxPunten}`;

      // Update de grafiek
      updateTotals();
      updateChart();
    }

    const themeToggle = document.getElementById("themeToggle");

      themeToggle.addEventListener("click", () => {
      const html = document.documentElement;
      if (html.getAttribute("data-theme") === "dark") {
        html.removeAttribute("data-theme"); 
        localStorage.setItem("theme", "light");
        chartkleur = "#4bc0c0";
      } else {
        html.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        chartkleur = "#1d2f42";
      }
      updateChart(); // grafiek opnieuw tekenen met de nieuwe kleur
    });


      // Herstel voorkeur bij laden
      if (localStorage.getItem("theme") === "dark") {
        chartkleur = "#1d2f42";
        updateChart();
        document.documentElement.setAttribute("data-theme", "dark");
      }

    

    </script>
    <script src="nav.js"></script>
    <script src="saveRapport.js"></script>
  </body>
</html>

  </body>
</html>
